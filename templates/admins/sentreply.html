{% extends 'admins/admin_home.html' %}
{% block body %}
  <div class="container mt-5">
    <h4 class="mb-4">Send reply</h4>
      {% csrf_token %}
    <form method="post" action="/myapp/sentreply_post/">
        {% csrf_token %}
        <input type="hidden"name="id"value="{{ id }}">
      <!-- Complaint Text -->
      <div class="mb-3">
        <label for="complaint" class="form-label">sent reply</label>
        <textarea class="form-control" id="reply"name="reply" rows="4" placeholder="Write your reply here... "name="sentreply" required></textarea>
      </div>



      <!-- Submit Button -->
      <button type="submit" class="btn btn-primary">Send reply</button>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

{#</html>#}
{% endblock %}
