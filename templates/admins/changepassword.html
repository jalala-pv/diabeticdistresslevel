{% extends 'admins/admin_home.html' %}
{% block body %}

<style>
    /* Professional Admin Palette */
    :root {
        --primary-accent: #06A3DA;
        --dark-navy: #091E3E;
        --card-glass: rgba(255, 255, 255, 0.05);
        --input-bg: rgba(255, 255, 255, 0.08);
        --text-muted: #A0B3CE;
    }

    /* Container setup to center the card */
    .auth-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 70vh;
        padding: 20px;
    }

    .auth-card {
        background: var(--dark-navy);
        width: 100%;
        max-width: 450px;
        border-radius: 20px;
        padding: 40px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        position: relative;
        overflow: hidden;
    }

    /* Accent top border */
    .auth-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 4px;
        background: var(--primary-accent);
    }

    .auth-header {
        text-align: center;
        margin-bottom: 35px;
    }

    .auth-header i {
        font-size: 2.5rem;
        color: var(--primary-accent);
        margin-bottom: 15px;
    }

    .auth-header h2 {
        color: #fff;
        font-weight: 700;
        letter-spacing: 1px;
        font-size: 1.75rem;
    }

    .auth-header p {
        color: var(--text-muted);
        font-size: 0.9rem;
    }

    /* Modern Input Styling */
    .form-group-custom {
        margin-bottom: 25px;
    }

    .form-group-custom label {
        color: #fff;
        font-weight: 600;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 10px;
        display: block;
    }

    .input-wrapper {
        position: relative;
        display: flex;
        align-items: center;
    }

    .input-wrapper i.field-icon {
        position: absolute;
        left: 15px;
        color: var(--primary-accent);
    }

    .form-control-modern {
        width: 100%;
        background: var(--input-bg);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        padding: 12px 15px 12px 45px;
        color: #fff;
        font-size: 0.95rem;
        transition: all 0.3s ease;
    }

    .form-control-modern:focus {
        background: rgba(255, 255, 255, 0.12);
        border-color: var(--primary-accent);
        outline: none;
        box-shadow: 0 0 10px rgba(6, 163, 218, 0.2);
    }

    /* Password Toggle visibility icon */
    .toggle-pass {
        position: absolute;
        right: 15px;
        color: var(--text-muted);
        cursor: pointer;
        transition: 0.3s;
    }

    .toggle-pass:hover {
        color: #fff;
    }

    /* Error Message Styling */
    .error-msg {
        font-size: 0.75rem;
        color: #ff4d4d;
        margin-top: 5px;
        display: block;
        min-height: 1rem;
    }

    /* Professional Button */
    .btn-submit-modern {
        background: var(--primary-accent);
        color: #fff;
        border: none;
        width: 100%;
        padding: 14px;
        border-radius: 12px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        margin-top: 10px;
        transition: all 0.3s;
        cursor: pointer;
    }

    .btn-submit-modern:hover {
        background: #0582af;
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(6, 163, 218, 0.4);
    }
</style>

<div class="auth-wrapper">
    <div class="auth-card wow zoomIn">

        <div class="auth-header">
            <i class="fas fa-user-shield"></i>
            <h2>Security Settings</h2>
            <p>Admin Password Management</p>
        </div>

        <form method="post" action="/myapp/changepassword_post/" id="changePasswordForm">
            {% csrf_token %}

            <div class="form-group-custom">
                <label>Current Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-key field-icon"></i>
                    <input type="password" class="form-control-modern" id="currentpassword" name="currentpassword" placeholder="••••••••" required>
                    <i class="fas fa-eye toggle-pass" onclick="togglePass('currentpassword', this)"></i>
                </div>
                <small class="error-msg" id="currentError"></small>
            </div>

            <div class="form-group-custom">
                <label>New Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock field-icon"></i>
                    <input type="password" class="form-control-modern" id="newpassword" name="newpassword" placeholder="Min. 6 characters" required>
                    <i class="fas fa-eye toggle-pass" onclick="togglePass('newpassword', this)"></i>
                </div>
                <small class="error-msg" id="newError"></small>
            </div>

            <div class="form-group-custom">
                <label>Confirm Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-check-double field-icon"></i>
                    <input type="password" class="form-control-modern" id="confirmpassword" name="confirmpassword" placeholder="Confirm new password" required>
                    <i class="fas fa-eye toggle-pass" onclick="togglePass('confirmpassword', this)"></i>
                </div>
                <small class="error-msg" id="confirmError"></small>
            </div>

            <button type="submit" class="btn-submit-modern">
                Update Password
            </button>
        </form>
    </div>
</div>

<script>
// Visibility Toggle
function togglePass(inputId, icon) {
    const input = document.getElementById(inputId);
    if (input.type === "password") {
        input.type = "text";
        icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
        input.type = "password";
        icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
}

// Validation Logic
document.getElementById("changePasswordForm").addEventListener("submit", function(e){
    let valid = true;
    const current = document.getElementById("currentpassword").value.trim();
    const newpass = document.getElementById("newpassword").value.trim();
    const confirm = document.getElementById("confirmpassword").value.trim();

    document.querySelectorAll(".error-msg").forEach(el => el.innerText = "");

    if(current === ""){
        document.getElementById("currentError").innerText = "Current password is required";
        valid = false;
    }
    if(newpass.length < 6){
        document.getElementById("newError").innerText = "Password must be at least 6 characters";
        valid = false;
    }
    if(current === newpass && current !== ""){
        document.getElementById("newError").innerText = "New password must be different";
        valid = false;
    }
    if(confirm !== newpass){
        document.getElementById("confirmError").innerText = "Passwords do not match";
        valid = false;
    }

    if(!valid) e.preventDefault();
});
</script>

{% endblock %}
